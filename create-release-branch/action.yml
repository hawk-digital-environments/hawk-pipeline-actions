name: 'Create Release Branch'
description: 'Prepares a release branch from the current branch with changelog and version management.'

inputs:
  version:
    description: 'Version to release (semver, e.g. 2.1.0)'
    required: true
  changelog-dir:
    description: 'Path to the changelog directory, relative to the repository root'
    required: false
    default: '_changelog'
  version-json:
    description: >
      Path to a JSON file (relative to repo root) in which the "version" property will be updated.
      Mutually exclusive with version-updater.
    required: false
    default: ''
  version-updater:
    description: >
      Path to a .js file (relative to repo root) that exports a default function
      with signature (version: string, resolve: (path: string) => string) => void | Promise<void>.
      Mutually exclusive with version-json.
    required: false
    default: ''
  next-template:
    description: >
      Path to a custom Markdown template file (relative to the repository root) that replaces
      next.md after each release. If omitted, the built-in default template is used.
    required: false
    default: ''
  next-upgrade-template:
    description: >
      Path to a custom Markdown template file (relative to the repository root) that replaces
      next-upgrade.md after each release. If omitted, the built-in default template is used.
    required: false
    default: ''
  shell:
    description: >
      An optional shell script to run inside the release branch after the changelog and version
      files have been updated but before the "Prepare release" commit is made.
      Runs in the repository root (GITHUB_WORKSPACE) via /bin/sh.
      Use this to generate or modify additional project files as part of the release preparation.
    required: false
    default: ''

runs:
  using: 'node24'
  main: 'dist/index.js'
